<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="lightu dark" />
    <title>Enkel Webbapp – Anteckningar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">
          <h1>Anteckningar</h1>
          <p class="subtitle">Snabbt, enkelt och sparas lokalt i din webbläsare.</p>
        </div>

        <div class="header-actions">
          <button id="themeToggle" class="btn btn-ghost" type="button" aria-pressed="false">
            Växla tema
          </button>
        </div>
      </header>

      <main class="main">
        <section class="card">
          <form id="noteForm" class="form" autocomplete="off">
            <label class="label" for="noteText">Skriv anteckning:</label>
            <div class="row">
              <input
                id="noteText"
                name="noteText"
                class="input"
                type="text"
                placeholder="Skriv något…"
                maxlength="200"
                required
              />
              <button class="btn btn-primary" type="submit">Lägg till</button>
            </div>
            <div class="helper">
              <span id="charCount" aria-live="polite">0/200</span>
              <button id="clearAll" class="btn btn-danger btn-small" type="button">
                Rensa allt
              </button>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="toolbar">
            <label class="label" for="search">Sök</label>
            <input id="search" class="input" type="search" placeholder="Filtrera anteckningar…" />
          </div>
          <ul id="noteList" class="list" aria-live="polite" aria-label="Anteckningar"></ul>
          <p id="emptyState" class="empty">Inga anteckningar ännu. Lägg till en ovan.</p>
        </section>
      </main>

      <footer class="footer">
        <span id="stats" class="stats">0 anteckningar</span>
        <span class="muted">Ingen server behövs.</span>
      </footer>
    </div>

    <template id="noteItemTemplate">
      <li class="item">
        <div class="item-main">
          <p class="item-text"></p>
          <p class="item-meta muted"></p>
        </div>
        <div class="item-actions">
          <button class="btn btn-ghost btn-small" data-action="edit" type="button">Redigera</button>
          <button class="btn btn-ghost btn-small" data-action="delete" type="button">Ta bort</button>
        </div>
      </li>
    </template>
